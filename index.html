<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Gadget Store</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header id="header">

    <img
        id="header-img"
        src="https://cdn-icons-png.flaticon.com/512/1055/1055687.png"
        alt="Logo"
    >

    <nav id="nav-bar">
        <a class="nav-link" href="#features">Features</a>
        <a class="nav-link" href="#video-section">Demo Video</a>
        <a class="nav-link" href="#pricing">Pricing</a>
    </nav>

</header>

<section id="hero">
    <h1>Welcome to Tech Gadget Store</h1>
    <p>Discover the latest smart gadgets.</p>
</section>

<section id="features">
    <h2>Features</h2>

    <div class="flex-container">
        <div class="card">
            <h3>Fast</h3>
            <p>High performance devices.</p>
        </div>

        <div class="card">
            <h3>Reliable</h3>
            <p>Built with premium quality.</p>
        </div>

        <div class="card">
            <h3>Affordable</h3>
            <p>Best value for money.</p>
        </div>
    </div>
</section>

<section id="video-section">
    <h2>Watch Product Demo</h2>

    <iframe
        id="video"
        width="560"
        height="315"
        src="https://www.youtube.com/embed/tgbNymZ7vqY"
        title="YouTube video"
        allowfullscreen>
    </iframe>

</section>

<section id="pricing">
    <h2>Pricing</h2>
    <p>Starting at just ₹999.</p>
</section>

<section id="contact">
    <h2>Subscribe for Updates</h2>

    <form
        id="form"
        action="https://www.freecodecamp.com/email-submit">

        <input
            id="email"
            type="email"
            name="email"
            placeholder="Enter your email address"
            required>

        <input
            id="submit"
            type="submit"
            value="Subscribe">

    </form>
</section>

</body>
</html>
